name: Verify Agent Skills
description: Verify that a fixed-layout Agent Skills bundle is synchronized with its source definitions.

inputs:
  root:
    description: Bundle root relative to the GitHub workspace. It must resolve inside a checked-out Git worktree.
    required: false
    default: skills

runs:
  using: composite
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Verify Agent Skills bundle
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        AGENT_SKILLS_ROOT: ${{ inputs.root }}
      run: bash "${GITHUB_ACTION_PATH}/../run-bundle-operation.sh" verify
