name: nuget-package

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/dotnet-verify.yaml
    permissions:
      contents: read

  package:
    name: package
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packageVersion: ${{ steps.release_source.outputs['package-version'] }}
      releaseSha: ${{ steps.release_source.outputs['release-sha'] }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('AgentSkills.slnx', '**/*.csproj') }}

      - name: Guard release source
        id: release_source
        uses: mackysoft/actions/release/source-guard@v1
        with:
          tag-name: ${{ github.ref_name }}
          default-branch: ${{ github.event.repository.default_branch }}

      - name: Pack and smoke test
        env:
          PACKAGE_VERSION: ${{ steps.release_source.outputs['package-version'] }}
          RELEASE_SHA: ${{ steps.release_source.outputs['release-sha'] }}
        run: >-
          bash scripts/verify-packages.sh
          --configuration Release
          --version "${PACKAGE_VERSION}"
          --repository-commit "${RELEASE_SHA}"
          --output artifacts/packages

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages
          if-no-files-found: error

  publish:
    name: publish
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    defaults:
      run:
        shell: bash

    env:
      PACKAGE_VERSION: ${{ needs.package.outputs.packageVersion }}
      RELEASE_SHA: ${{ needs.package.outputs.releaseSha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download packages
        uses: actions/download-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages

      - name: Guard release source
        id: release_source
        uses: mackysoft/actions/release/source-guard@v1
        with:
          tag-name: ${{ github.ref_name }}
          default-branch: ${{ github.event.repository.default_branch }}
          expected-release-sha: ${{ env.RELEASE_SHA }}

      - name: Validate package artifacts
        env:
          GUARDED_PACKAGE_VERSION: ${{ steps.release_source.outputs['package-version'] }}
        run: |
          set -euo pipefail

          if [[ "${GUARDED_PACKAGE_VERSION}" != "${PACKAGE_VERSION}" ]]; then
            echo "Guarded package version ${GUARDED_PACKAGE_VERSION} must match package version ${PACKAGE_VERSION}." >&2
            exit 2
          fi

          expected_packages=(
            "MackySoft.AgentSkills.${PACKAGE_VERSION}.nupkg"
            "MackySoft.AgentSkills.Cli.${PACKAGE_VERSION}.nupkg"
            "MackySoft.AgentSkills.Hosting.${PACKAGE_VERSION}.nupkg"
            "MackySoft.AgentSkills.ConsoleAppFramework.${PACKAGE_VERSION}.nupkg"
          )

          for package_file in "${expected_packages[@]}"; do
            test -f "artifacts/packages/${package_file}"
          done

          actual_packages=()
          while IFS= read -r package_file; do
            actual_packages+=("${package_file}")
          done < <(find artifacts/packages -maxdepth 1 -type f -name '*.nupkg' -exec basename {} \; | sort)

          sorted_expected_packages=()
          while IFS= read -r package_file; do
            sorted_expected_packages+=("${package_file}")
          done < <(printf '%s\n' "${expected_packages[@]}" | sort)

          if [[ "${#actual_packages[@]}" -ne "${#sorted_expected_packages[@]}" ]]; then
            printf 'Unexpected package artifacts:\n' >&2
            printf '  %s\n' "${actual_packages[@]}" >&2
            exit 1
          fi

          for index in "${!sorted_expected_packages[@]}"; do
            if [[ "${actual_packages[$index]}" != "${sorted_expected_packages[$index]}" ]]; then
              printf 'Unexpected package artifacts:\n' >&2
              printf '  %s\n' "${actual_packages[@]}" >&2
              exit 1
            fi
          done

      - name: Inspect publication state
        id: package_state
        uses: mackysoft/actions/nuget/package-state@v1
        with:
          mode: inspect
          package-version: ${{ env.PACKAGE_VERSION }}
          package-ids: |
            MackySoft.AgentSkills
            MackySoft.AgentSkills.Cli
            MackySoft.AgentSkills.Hosting
            MackySoft.AgentSkills.ConsoleAppFramework

      - name: Publish packages to nuget.org
        if: ${{ steps.package_state.outputs['publish-required'] == 'true' }}
        uses: mackysoft/actions/nuget/trusted-publish@v1
        with:
          package-glob: artifacts/packages/*.nupkg
          nuget-user: ${{ vars.NUGET_USER }}

      - name: Wait for published packages
        uses: mackysoft/actions/nuget/package-state@v1
        with:
          mode: wait
          package-version: ${{ env.PACKAGE_VERSION }}
          package-ids: |
            MackySoft.AgentSkills
            MackySoft.AgentSkills.Cli
            MackySoft.AgentSkills.Hosting
            MackySoft.AgentSkills.ConsoleAppFramework
          max-attempts: 30
          interval-seconds: 10

      - name: Download published packages for release mirror
        run: |
          set -euo pipefail

          package_url() {
            local package_id="$1"
            local version="$2"
            local lower_package_id
            local lower_version
            lower_package_id="$(printf '%s' "${package_id}" | tr '[:upper:]' '[:lower:]')"
            lower_version="$(printf '%s' "${version}" | tr '[:upper:]' '[:lower:]')"
            printf 'https://api.nuget.org/v3-flatcontainer/%s/%s/%s.%s.nupkg' \
              "${lower_package_id}" \
              "${lower_version}" \
              "${lower_package_id}" \
              "${lower_version}"
          }

          download_published_package() {
            local package_id="$1"
            local path="$2"
            local url
            url="$(package_url "${package_id}" "${PACKAGE_VERSION}")"

            curl --fail --silent --show-error --location "${url}" --output "${path}"
            bash scripts/validate-nuget-package-repository-commit.sh \
              --package-id "${package_id}" \
              --package-path "${path}" \
              --expected-commit "${RELEASE_SHA}"
          }

          download_published_package \
            "MackySoft.AgentSkills" \
            "artifacts/packages/MackySoft.AgentSkills.${PACKAGE_VERSION}.nupkg"
          download_published_package \
            "MackySoft.AgentSkills.Cli" \
            "artifacts/packages/MackySoft.AgentSkills.Cli.${PACKAGE_VERSION}.nupkg"
          download_published_package \
            "MackySoft.AgentSkills.Hosting" \
            "artifacts/packages/MackySoft.AgentSkills.Hosting.${PACKAGE_VERSION}.nupkg"
          download_published_package \
            "MackySoft.AgentSkills.ConsoleAppFramework" \
            "artifacts/packages/MackySoft.AgentSkills.ConsoleAppFramework.${PACKAGE_VERSION}.nupkg"

      - name: Re-guard release source
        uses: mackysoft/actions/release/source-guard@v1
        with:
          tag-name: ${{ github.ref_name }}
          default-branch: ${{ github.event.repository.default_branch }}
          expected-release-sha: ${{ env.RELEASE_SHA }}

      - name: Mirror packages to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.package.outputs.packageVersion }}
          REPOSITORY: ${{ github.repository }}
        run: >-
          ./scripts/mirror-nuget-package-release.sh
          --repository "${REPOSITORY}"
          --tag-name "${RELEASE_TAG}"
          --package-glob "artifacts/packages/*.nupkg"
          --title "${RELEASE_TAG}"
          --notes ""
