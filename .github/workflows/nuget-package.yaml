name: nuget-package

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packageVersion: ${{ steps.version.outputs.packageVersion }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('AgentSkills.slnx', '**/*.csproj') }}

      - name: Resolve package version
        id: version
        run: |
          set -euo pipefail

          mapfile -t package_versions < <(sed -nE 's:.*<Version>([^<]+)</Version>.*:\1:p' Directory.Build.props)
          if [[ "${#package_versions[@]}" -ne 1 ]]; then
            echo "Directory.Build.props must contain exactly one Version property." >&2
            exit 2
          fi
          package_version="${package_versions[0]}"

          if [[ ! "${package_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "package version must be SemVer without a leading v: ${package_version}" >&2
            exit 2
          fi

          echo "packageVersion=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "PACKAGE_VERSION=${package_version}" >> "${GITHUB_ENV}"

      - name: Verify
        run: bash scripts/verify.sh --configuration Release

      - name: Pack and smoke test
        run: >-
          bash scripts/verify-packages.sh
          --configuration Release
          --version "${PACKAGE_VERSION}"
          --output artifacts/packages

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages
          if-no-files-found: error

  publish:
    name: publish
    needs: package
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    defaults:
      run:
        shell: bash

    env:
      PACKAGE_VERSION: ${{ needs.package.outputs.packageVersion }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download packages
        uses: actions/download-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages

      - name: Validate publish ref
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" != "branch" || "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]]; then
            echo "NuGet publish must be dispatched from the default branch (${DEFAULT_BRANCH})." >&2
            exit 2
          fi

          test -f "artifacts/packages/MackySoft.AgentSkills.${PACKAGE_VERSION}.nupkg"
          test -f "artifacts/packages/MackySoft.AgentSkills.Cli.${PACKAGE_VERSION}.nupkg"

      - name: Inspect publication state
        id: state
        run: |
          set -euo pipefail

          package_url() {
            local package_id="$1"
            local version="$2"
            local lower_package_id
            local lower_version
            lower_package_id="$(printf '%s' "${package_id}" | tr '[:upper:]' '[:lower:]')"
            lower_version="$(printf '%s' "${version}" | tr '[:upper:]' '[:lower:]')"
            printf 'https://api.nuget.org/v3-flatcontainer/%s/%s/%s.%s.nupkg' \
              "${lower_package_id}" \
              "${lower_version}" \
              "${lower_package_id}" \
              "${lower_version}"
          }

          package_exists() {
            curl --fail --silent --head "$1" >/dev/null 2>&1
          }

          library_package_url="$(package_url "MackySoft.AgentSkills" "${PACKAGE_VERSION}")"
          cli_package_url="$(package_url "MackySoft.AgentSkills.Cli" "${PACKAGE_VERSION}")"

          library_exists=false
          cli_exists=false
          if package_exists "${library_package_url}"; then
            library_exists=true
          fi
          if package_exists "${cli_package_url}"; then
            cli_exists=true
          fi

          tag_ref="$(git ls-remote --tags origin "refs/tags/${PACKAGE_VERSION}" | awk '{print $1}' || true)"
          tag_exists=false
          if [[ -n "${tag_ref}" ]]; then
            tag_exists=true
            if [[ "${tag_ref}" != "${GITHUB_SHA}" ]]; then
              echo "Release tag ${PACKAGE_VERSION} already exists at ${tag_ref}, not current commit ${GITHUB_SHA}." >&2
              exit 1
            fi
            if [[ "${library_exists}" != "true" || "${cli_exists}" != "true" ]]; then
              echo "Release tag ${PACKAGE_VERSION} exists but one or more NuGet packages are missing. Refusing to publish into an inconsistent release state." >&2
              exit 1
            fi
          fi

          echo "libraryExists=${library_exists}" >> "${GITHUB_OUTPUT}"
          echo "cliExists=${cli_exists}" >> "${GITHUB_OUTPUT}"
          echo "tagExists=${tag_exists}" >> "${GITHUB_OUTPUT}"
          echo "libraryPackageUrl=${library_package_url}" >> "${GITHUB_OUTPUT}"
          echo "cliPackageUrl=${cli_package_url}" >> "${GITHUB_OUTPUT}"

      - name: Validate NuGet trusted publishing user
        if: ${{ steps.state.outputs.libraryExists != 'true' || steps.state.outputs.cliExists != 'true' }}
        env:
          NUGET_USER: ${{ vars.NUGET_USER }}
        run: |
          set -euo pipefail

          if [[ -z "${NUGET_USER}" ]]; then
            echo "Repository variable NUGET_USER must be set to the nuget.org profile name." >&2
            exit 2
          fi

      - name: NuGet login
        if: ${{ steps.state.outputs.libraryExists != 'true' || steps.state.outputs.cliExists != 'true' }}
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish library to nuget.org
        if: ${{ steps.state.outputs.libraryExists != 'true' }}
        run: >-
          dotnet nuget push
          artifacts/packages/MackySoft.AgentSkills.${PACKAGE_VERSION}.nupkg
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json

      - name: Publish CLI to nuget.org
        if: ${{ steps.state.outputs.cliExists != 'true' }}
        run: >-
          dotnet nuget push
          artifacts/packages/MackySoft.AgentSkills.Cli.${PACKAGE_VERSION}.nupkg
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json

      - name: Wait for published packages
        env:
          LIBRARY_PACKAGE_URL: ${{ steps.state.outputs.libraryPackageUrl }}
          CLI_PACKAGE_URL: ${{ steps.state.outputs.cliPackageUrl }}
        run: |
          set -euo pipefail

          wait_for_package() {
            local package_id="$1"
            local url="$2"
            if [[ -z "${url}" ]]; then
              echo "Package URL output is missing: ${package_id}" >&2
              exit 2
            fi

            for attempt in {1..30}; do
              if curl --fail --silent --show-error --head "${url}" >/dev/null; then
                return 0
              fi
              echo "Waiting for ${package_id} ${PACKAGE_VERSION} to become available on nuget.org (${attempt}/30)."
              sleep 10
            done
            echo "Package did not become available on nuget.org: ${package_id} ${PACKAGE_VERSION}" >&2
            exit 1
          }

          wait_for_package "MackySoft.AgentSkills" "${LIBRARY_PACKAGE_URL}"
          wait_for_package "MackySoft.AgentSkills.Cli" "${CLI_PACKAGE_URL}"

      - name: Create release tag
        if: ${{ steps.state.outputs.tagExists != 'true' }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${PACKAGE_VERSION}" "${GITHUB_SHA}"
          git push origin "refs/tags/${PACKAGE_VERSION}"

      - name: Mirror packages to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.package.outputs.packageVersion }}
          REPOSITORY: ${{ github.repository }}
        run: >-
          ./scripts/mirror-nuget-package-release.sh
          --repository "${REPOSITORY}"
          --tag-name "${RELEASE_TAG}"
          --package-glob "artifacts/packages/*.nupkg"
          --title "${RELEASE_TAG}"
          --notes ""
