name: nuget-package

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/dotnet-verify.yaml
    permissions:
      contents: read

  package:
    name: package
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packageVersion: ${{ steps.version.outputs.package-version }}
      releaseSha: ${{ steps.source.outputs.release-sha }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: mackysoft/actions/setup-dotnet-cache@v1
        with:
          dotnet-version: 10.0.x
          cache-key-files: |
            AgentSkills.slnx
            **/*.csproj

      - name: Resolve package version
        id: version
        uses: mackysoft/actions/resolve-release-version@v1
        with:
          event-name: ${{ github.event_name }}
          ref-name: ${{ github.ref_name }}
          allow-prerelease: true

      - name: Validate release source
        id: source
        uses: mackysoft/actions/validate-release-source@v1
        with:
          tag-name: ${{ steps.version.outputs.tag-name }}
          default-branch: ${{ github.event.repository.default_branch }}
          require-head-match: true

      - name: Pack and smoke test
        run: >-
          bash scripts/verify-packages.sh
          --configuration Release
          --version "${{ steps.version.outputs.package-version }}"
          --repository-commit "${{ steps.source.outputs.release-sha }}"
          --output artifacts/packages

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages
          if-no-files-found: error

  publish:
    name: publish
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    defaults:
      run:
        shell: bash

    env:
      PACKAGE_VERSION: ${{ needs.package.outputs.packageVersion }}
      RELEASE_SHA: ${{ needs.package.outputs.releaseSha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: mackysoft/actions/setup-dotnet-cache@v1
        with:
          dotnet-version: 10.0.x
          cache-key-files: |
            AgentSkills.slnx
            **/*.csproj

      - name: Download packages
        uses: actions/download-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages

      - name: Validate publish tag
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "NuGet publish must be triggered by a release tag." >&2
            exit 2
          fi

          if [[ "${GITHUB_REF_NAME}" != "${PACKAGE_VERSION}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} must match package version ${PACKAGE_VERSION}." >&2
            exit 2
          fi

          if [[ -z "${RELEASE_SHA}" ]]; then
            echo "Validated release SHA output is missing." >&2
            exit 2
          fi

          test -f "artifacts/packages/MackySoft.AgentSkills.${PACKAGE_VERSION}.nupkg"
          test -f "artifacts/packages/MackySoft.AgentSkills.Cli.${PACKAGE_VERSION}.nupkg"

      - name: Validate publish source
        uses: mackysoft/actions/validate-release-source@v1
        with:
          tag-name: ${{ github.ref_name }}
          release-sha: ${{ env.RELEASE_SHA }}
          default-branch: ${{ github.event.repository.default_branch }}
          require-head-match: true

      - name: Inspect publication state
        id: publication
        uses: mackysoft/actions/inspect-nuget-package-state@v1
        with:
          version: ${{ env.PACKAGE_VERSION }}
          fail-on-partial: false
          package-ids: |
            MackySoft.AgentSkills
            MackySoft.AgentSkills.Cli

      - name: Map publication state
        id: state
        env:
          EXISTING_PACKAGE_IDS: ${{ steps.publication.outputs.existing-package-ids }}
        run: |
          set -euo pipefail

          package_url() {
            local package_id="$1"
            local version="$2"
            local lower_package_id
            local lower_version
            lower_package_id="$(printf '%s' "${package_id}" | tr '[:upper:]' '[:lower:]')"
            lower_version="$(printf '%s' "${version}" | tr '[:upper:]' '[:lower:]')"
            printf 'https://api.nuget.org/v3-flatcontainer/%s/%s/%s.%s.nupkg' \
              "${lower_package_id}" \
              "${lower_version}" \
              "${lower_package_id}" \
              "${lower_version}"
          }

          library_package_url="$(package_url "MackySoft.AgentSkills" "${PACKAGE_VERSION}")"
          cli_package_url="$(package_url "MackySoft.AgentSkills.Cli" "${PACKAGE_VERSION}")"

          library_exists=false
          cli_exists=false
          if grep -Fx "MackySoft.AgentSkills" <<< "${EXISTING_PACKAGE_IDS}" >/dev/null; then
            library_exists=true
          fi
          if grep -Fx "MackySoft.AgentSkills.Cli" <<< "${EXISTING_PACKAGE_IDS}" >/dev/null; then
            cli_exists=true
          fi

          echo "libraryExists=${library_exists}" >> "${GITHUB_OUTPUT}"
          echo "cliExists=${cli_exists}" >> "${GITHUB_OUTPUT}"
          echo "libraryPackageUrl=${library_package_url}" >> "${GITHUB_OUTPUT}"
          echo "cliPackageUrl=${cli_package_url}" >> "${GITHUB_OUTPUT}"

      - name: Download and validate existing published packages
        if: ${{ steps.state.outputs.libraryExists == 'true' || steps.state.outputs.cliExists == 'true' }}
        env:
          LIBRARY_EXISTS: ${{ steps.state.outputs.libraryExists }}
          CLI_EXISTS: ${{ steps.state.outputs.cliExists }}
          LIBRARY_PACKAGE_URL: ${{ steps.state.outputs.libraryPackageUrl }}
          CLI_PACKAGE_URL: ${{ steps.state.outputs.cliPackageUrl }}
        run: |
          set -euo pipefail

          download_existing_package() {
            local package_id="$1"
            local exists="$2"
            local url="$3"
            local path="$4"

            if [[ "${exists}" != "true" ]]; then
              return 0
            fi

            curl --fail --silent --show-error --location "${url}" --output "${path}"
            bash scripts/validate-nuget-package-repository-commit.sh \
              --package-id "${package_id}" \
              --package-path "${path}" \
              --expected-commit "${RELEASE_SHA}"
          }

          download_existing_package \
            "MackySoft.AgentSkills" \
            "${LIBRARY_EXISTS}" \
            "${LIBRARY_PACKAGE_URL}" \
            "artifacts/packages/MackySoft.AgentSkills.${PACKAGE_VERSION}.nupkg"
          download_existing_package \
            "MackySoft.AgentSkills.Cli" \
            "${CLI_EXISTS}" \
            "${CLI_PACKAGE_URL}" \
            "artifacts/packages/MackySoft.AgentSkills.Cli.${PACKAGE_VERSION}.nupkg"

      - name: Validate NuGet trusted publishing user
        if: ${{ steps.publication.outputs.publish-required == 'true' }}
        env:
          NUGET_USER: ${{ vars.NUGET_USER }}
        run: |
          set -euo pipefail

          if [[ -z "${NUGET_USER}" ]]; then
            echo "Repository variable NUGET_USER must be set to the nuget.org profile name." >&2
              exit 2
            fi

      - name: Publish to nuget.org
        if: ${{ steps.publication.outputs.publish-required == 'true' }}
        uses: mackysoft/actions/publish-nuget-package@v1
        with:
          package-glob: artifacts/packages/*.nupkg
          nuget-user: ${{ vars.NUGET_USER }}

      - name: Wait for published packages
        uses: mackysoft/actions/wait-nuget-packages@v1
        with:
          version: ${{ env.PACKAGE_VERSION }}
          package-ids: |
            MackySoft.AgentSkills
            MackySoft.AgentSkills.Cli

      - name: Download published packages for release mirror
        env:
          LIBRARY_PACKAGE_URL: ${{ steps.state.outputs.libraryPackageUrl }}
          CLI_PACKAGE_URL: ${{ steps.state.outputs.cliPackageUrl }}
        run: |
          set -euo pipefail

          download_published_package() {
            local package_id="$1"
            local url="$2"
            local path="$3"

            curl --fail --silent --show-error --location "${url}" --output "${path}"
            bash scripts/validate-nuget-package-repository-commit.sh \
              --package-id "${package_id}" \
              --package-path "${path}" \
              --expected-commit "${RELEASE_SHA}"
          }

          download_published_package \
            "MackySoft.AgentSkills" \
            "${LIBRARY_PACKAGE_URL}" \
            "artifacts/packages/MackySoft.AgentSkills.${PACKAGE_VERSION}.nupkg"
          download_published_package \
            "MackySoft.AgentSkills.Cli" \
            "${CLI_PACKAGE_URL}" \
            "artifacts/packages/MackySoft.AgentSkills.Cli.${PACKAGE_VERSION}.nupkg"

      - name: Validate release source before mirror
        uses: mackysoft/actions/validate-release-source@v1
        with:
          tag-name: ${{ github.ref_name }}
          release-sha: ${{ env.RELEASE_SHA }}
          default-branch: ${{ github.event.repository.default_branch }}
          require-head-match: true

      - name: Mirror packages to GitHub Release
        uses: mackysoft/actions/mirror-github-release-assets@v1
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          tag-name: ${{ needs.package.outputs.packageVersion }}
          title: ${{ needs.package.outputs.packageVersion }}
          notes: ""
          asset-glob: artifacts/packages/*.nupkg
          update-existing-release: false
