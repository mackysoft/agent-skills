name: nuget-package

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/dotnet-verify.yaml
    permissions:
      contents: read

  package:
    name: package
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packageVersion: ${{ steps.version.outputs.packageVersion }}
      releaseSha: ${{ steps.source.outputs.releaseSha }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('AgentSkills.slnx', '**/*.csproj') }}

      - name: Resolve package version
        id: version
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "NuGet publish must be triggered by a release tag." >&2
            exit 2
          fi

          tag_name="${GITHUB_REF_NAME}"
          semver_pattern='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*))*))?$'
          if [[ ! "${tag_name}" =~ ${semver_pattern} ]]; then
            echo "Release tag must be SemVer without a leading v: ${tag_name}" >&2
            exit 2
          fi

          package_version="${tag_name}"
          echo "packageVersion=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "PACKAGE_VERSION=${package_version}" >> "${GITHUB_ENV}"

      - name: Validate release source
        id: source
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git fetch origin "${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
          git fetch --force origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"

          release_sha="$(git rev-list -n 1 "refs/tags/${TAG_NAME}")"
          checkout_sha="$(git rev-parse HEAD)"
          if [[ "${checkout_sha}" != "${release_sha}" ]]; then
            echo "Checked out source does not match release tag. Expected: ${release_sha}. Actual: ${checkout_sha}" >&2
            exit 1
          fi

          if ! git merge-base --is-ancestor "${release_sha}" "origin/${DEFAULT_BRANCH}"; then
            echo "Release source must be reachable from origin/${DEFAULT_BRANCH}. Actual sha: ${release_sha}" >&2
            exit 1
          fi

          echo "releaseSha=${release_sha}" >> "${GITHUB_OUTPUT}"
          echo "RELEASE_SHA=${release_sha}" >> "${GITHUB_ENV}"

      - name: Pack and smoke test
        run: >-
          bash scripts/verify-packages.sh
          --configuration Release
          --version "${PACKAGE_VERSION}"
          --repository-commit "${RELEASE_SHA}"
          --output artifacts/packages

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages
          if-no-files-found: error

  publish:
    name: publish
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    defaults:
      run:
        shell: bash

    env:
      PACKAGE_VERSION: ${{ needs.package.outputs.packageVersion }}
      RELEASE_SHA: ${{ needs.package.outputs.releaseSha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download packages
        uses: actions/download-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages

      - name: Validate publish tag
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "NuGet publish must be triggered by a release tag." >&2
            exit 2
          fi

          if [[ "${GITHUB_REF_NAME}" != "${PACKAGE_VERSION}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} must match package version ${PACKAGE_VERSION}." >&2
            exit 2
          fi

          if [[ -z "${RELEASE_SHA}" ]]; then
            echo "Validated release SHA output is missing." >&2
            exit 2
          fi

          bash scripts/validate-release-tag.sh --tag-name "${GITHUB_REF_NAME}" --expected-sha "${RELEASE_SHA}"

          test -f "artifacts/packages/MackySoft.AgentSkills.${PACKAGE_VERSION}.nupkg"
          test -f "artifacts/packages/MackySoft.AgentSkills.Cli.${PACKAGE_VERSION}.nupkg"

      - name: Inspect publication state
        id: state
        run: |
          set -euo pipefail

          package_url() {
            local package_id="$1"
            local version="$2"
            local lower_package_id
            local lower_version
            lower_package_id="$(printf '%s' "${package_id}" | tr '[:upper:]' '[:lower:]')"
            lower_version="$(printf '%s' "${version}" | tr '[:upper:]' '[:lower:]')"
            printf 'https://api.nuget.org/v3-flatcontainer/%s/%s/%s.%s.nupkg' \
              "${lower_package_id}" \
              "${lower_version}" \
              "${lower_package_id}" \
              "${lower_version}"
          }

          package_exists() {
            curl --fail --silent --head "$1" >/dev/null 2>&1
          }

          library_package_url="$(package_url "MackySoft.AgentSkills" "${PACKAGE_VERSION}")"
          cli_package_url="$(package_url "MackySoft.AgentSkills.Cli" "${PACKAGE_VERSION}")"

          library_exists=false
          cli_exists=false
          if package_exists "${library_package_url}"; then
            library_exists=true
          fi
          if package_exists "${cli_package_url}"; then
            cli_exists=true
          fi

          echo "libraryExists=${library_exists}" >> "${GITHUB_OUTPUT}"
          echo "cliExists=${cli_exists}" >> "${GITHUB_OUTPUT}"
          echo "libraryPackageUrl=${library_package_url}" >> "${GITHUB_OUTPUT}"
          echo "cliPackageUrl=${cli_package_url}" >> "${GITHUB_OUTPUT}"

      - name: Download and validate existing published packages
        if: ${{ steps.state.outputs.libraryExists == 'true' || steps.state.outputs.cliExists == 'true' }}
        env:
          LIBRARY_EXISTS: ${{ steps.state.outputs.libraryExists }}
          CLI_EXISTS: ${{ steps.state.outputs.cliExists }}
          LIBRARY_PACKAGE_URL: ${{ steps.state.outputs.libraryPackageUrl }}
          CLI_PACKAGE_URL: ${{ steps.state.outputs.cliPackageUrl }}
        run: |
          set -euo pipefail

          download_existing_package() {
            local package_id="$1"
            local exists="$2"
            local url="$3"
            local path="$4"

            if [[ "${exists}" != "true" ]]; then
              return 0
            fi

            curl --fail --silent --show-error --location "${url}" --output "${path}"
            bash scripts/validate-nuget-package-repository-commit.sh \
              --package-id "${package_id}" \
              --package-path "${path}" \
              --expected-commit "${RELEASE_SHA}"
          }

          download_existing_package \
            "MackySoft.AgentSkills" \
            "${LIBRARY_EXISTS}" \
            "${LIBRARY_PACKAGE_URL}" \
            "artifacts/packages/MackySoft.AgentSkills.${PACKAGE_VERSION}.nupkg"
          download_existing_package \
            "MackySoft.AgentSkills.Cli" \
            "${CLI_EXISTS}" \
            "${CLI_PACKAGE_URL}" \
            "artifacts/packages/MackySoft.AgentSkills.Cli.${PACKAGE_VERSION}.nupkg"

      - name: Validate NuGet trusted publishing user
        if: ${{ steps.state.outputs.libraryExists != 'true' || steps.state.outputs.cliExists != 'true' }}
        env:
          NUGET_USER: ${{ vars.NUGET_USER }}
        run: |
          set -euo pipefail

          if [[ -z "${NUGET_USER}" ]]; then
            echo "Repository variable NUGET_USER must be set to the nuget.org profile name." >&2
            exit 2
          fi

      - name: NuGet login
        if: ${{ steps.state.outputs.libraryExists != 'true' || steps.state.outputs.cliExists != 'true' }}
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish library to nuget.org
        if: ${{ steps.state.outputs.libraryExists != 'true' }}
        run: |
          set -euo pipefail

          bash scripts/validate-release-tag.sh --tag-name "${GITHUB_REF_NAME}" --expected-sha "${RELEASE_SHA}"
          dotnet nuget push \
            "artifacts/packages/MackySoft.AgentSkills.${PACKAGE_VERSION}.nupkg" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json

      - name: Publish CLI to nuget.org
        if: ${{ steps.state.outputs.cliExists != 'true' }}
        run: |
          set -euo pipefail

          bash scripts/validate-release-tag.sh --tag-name "${GITHUB_REF_NAME}" --expected-sha "${RELEASE_SHA}"
          dotnet nuget push \
            "artifacts/packages/MackySoft.AgentSkills.Cli.${PACKAGE_VERSION}.nupkg" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json

      - name: Wait for published packages
        env:
          LIBRARY_PACKAGE_URL: ${{ steps.state.outputs.libraryPackageUrl }}
          CLI_PACKAGE_URL: ${{ steps.state.outputs.cliPackageUrl }}
        run: |
          set -euo pipefail

          wait_for_package() {
            local package_id="$1"
            local url="$2"
            if [[ -z "${url}" ]]; then
              echo "Package URL output is missing: ${package_id}" >&2
              exit 2
            fi

            for attempt in {1..30}; do
              if curl --fail --silent --show-error --head "${url}" >/dev/null; then
                return 0
              fi
              echo "Waiting for ${package_id} ${PACKAGE_VERSION} to become available on nuget.org (${attempt}/30)."
              sleep 10
            done
            echo "Package did not become available on nuget.org: ${package_id} ${PACKAGE_VERSION}" >&2
            exit 1
          }

          wait_for_package "MackySoft.AgentSkills" "${LIBRARY_PACKAGE_URL}"
          wait_for_package "MackySoft.AgentSkills.Cli" "${CLI_PACKAGE_URL}"

      - name: Download published packages for release mirror
        env:
          LIBRARY_PACKAGE_URL: ${{ steps.state.outputs.libraryPackageUrl }}
          CLI_PACKAGE_URL: ${{ steps.state.outputs.cliPackageUrl }}
        run: |
          set -euo pipefail

          download_published_package() {
            local package_id="$1"
            local url="$2"
            local path="$3"

            curl --fail --silent --show-error --location "${url}" --output "${path}"
            bash scripts/validate-nuget-package-repository-commit.sh \
              --package-id "${package_id}" \
              --package-path "${path}" \
              --expected-commit "${RELEASE_SHA}"
          }

          download_published_package \
            "MackySoft.AgentSkills" \
            "${LIBRARY_PACKAGE_URL}" \
            "artifacts/packages/MackySoft.AgentSkills.${PACKAGE_VERSION}.nupkg"
          download_published_package \
            "MackySoft.AgentSkills.Cli" \
            "${CLI_PACKAGE_URL}" \
            "artifacts/packages/MackySoft.AgentSkills.Cli.${PACKAGE_VERSION}.nupkg"

      - name: Mirror packages to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.package.outputs.packageVersion }}
          REPOSITORY: ${{ github.repository }}
        run: >-
          ./scripts/mirror-nuget-package-release.sh
          --repository "${REPOSITORY}"
          --tag-name "${RELEASE_TAG}"
          --package-glob "artifacts/packages/*.nupkg"
          --title "${RELEASE_TAG}"
          --notes ""
          --expected-sha "${RELEASE_SHA}"
