name: dotnet-verify

on:
  workflow_call:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: mackysoft/actions/setup-dotnet-cache@v1
        with:
          dotnet-version: 10.0.x
          cache-key-files: |
            AgentSkills.slnx
            **/*.csproj
          restore-command: dotnet restore AgentSkills.slnx

      - name: Verify
        run: bash scripts/verify.sh --no-restore --configuration Release
