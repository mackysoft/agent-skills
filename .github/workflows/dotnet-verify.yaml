name: dotnet-verify

on:
  workflow_call:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    env:
      SELF_HOSTED_PACKAGE_VERSION: 0.0.0-ci.${{ github.run_id }}.${{ github.run_attempt }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('AgentSkills.slnx', '**/*.csproj') }}

      - name: Verify
        run: bash scripts/verify.sh --configuration Release

      - name: Prepare self-hosted Agent Skills CLI
        run: >-
          bash scripts/prepare-self-hosted-cli.sh
          --version "${SELF_HOSTED_PACKAGE_VERSION}"
          --output "${RUNNER_TEMP}/agent-skills-feed"

      - name: Verify repository skills through the Action
        uses: ./actions/verify
        with:
          root: skills
