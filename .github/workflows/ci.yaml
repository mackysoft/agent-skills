name: ci

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/dotnet-verify.yaml
    permissions:
      contents: read

  package:
    name: package
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: mackysoft/actions/setup-dotnet-cache@v1
        with:
          dotnet-version: 10.0.x
          cache-key-files: |
            AgentSkills.slnx
            **/*.csproj

      - name: Pack and smoke test
        run: bash scripts/verify-packages.sh --configuration Release
