name: ci

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Commit SHA that a synchronizing workflow expects this run to verify.
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  source:
    name: synchronized source
    if: inputs.expected_sha != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Guard synchronized commit
        env:
          ACTUAL_SHA: ${{ github.sha }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          if [[ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]]; then
            echo "Expected synchronized commit ${EXPECTED_SHA}, but workflow_dispatch resolved ${ACTUAL_SHA}." >&2
            exit 1
          fi

  test:
    needs: source
    if: always() && (needs.source.result == 'success' || needs.source.result == 'skipped')
    uses: ./.github/workflows/dotnet-verify.yaml
    permissions:
      contents: read

  package:
    name: package
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('AgentSkills.slnx', '**/*.csproj') }}

      - name: Pack and smoke test
        run: bash scripts/verify-packages.sh --configuration Release
